<!DOCTYPE html>
<html>
<head>
    <title>Indian Fitness Planner Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #00b09b, #96c93d);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00b09b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #019875;
        }

        .result {
            margin-top: 20px;
            background: #f4f6f8;
            padding: 15px;
            border-radius: 8px;
        }

        .result h3 {
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🥗 Indian Fitness Planner Pro</h2>

    <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    <input type="number" id="age" placeholder="Age">
    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (cm)">

    <select id="activity">
        <option value="1.2">Sedentary (No Exercise)</option>
        <option value="1.375">Light Exercise (1-3 days)</option>
        <option value="1.55">Moderate Exercise (3-5 days)</option>
        <option value="1.725">Heavy Exercise (6-7 days)</option>
    </select>

    <select id="goal">
        <option value="maintain">Maintain Weight</option>
        <option value="lose">Lose Weight</option>
        <option value="gain">Gain Weight</option>
    </select>

    <button onclick="calculate()">Calculate Plan</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculate() {

    let gender = document.getElementById("gender").value;
    let age = parseFloat(document.getElementById("age").value);
    let weight = parseFloat(document.getElementById("weight").value);
    let height = parseFloat(document.getElementById("height").value);
    let activity = parseFloat(document.getElementById("activity").value);
    let goal = document.getElementById("goal").value;

    if(!age || !weight || !height) {
        alert("Please fill all fields properly");
        return;
    }

    // BMI
    let bmi = weight / ((height/100) * (height/100));

    // BMR (Mifflin St Jeor)
    let bmr;
    if(gender === "male") {
        bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
    } else {
        bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
    }

    // Daily Calories
    let calories = bmr * activity;

    if(goal === "lose") calories -= 500;
    if(goal === "gain") calories += 500;

    // Protein & Water
    let protein = weight * 1.6;
    let water = weight * 0.033;

    // Meal Suggestion
    let meal;

    if(calories < 2000) {
        meal = `
        🍳 Breakfast: 2 Idli + Sambar  
        🍛 Lunch: 1 cup rice + Dal + Veg curry  
        🍲 Dinner: 2 Chapati + Paneer/Chicken  
        🥜 Snacks: Peanuts / Fruit
        `;
    } else if(calories < 2500) {
        meal = `
        🍳 Breakfast: 3 Dosa + Sambar  
        🍛 Lunch: 2 cups rice + Chicken curry  
        🍲 Dinner: 3 Chapati + Egg curry  
        🥜 Snacks: Banana + Milk
        `;
    } else {
        meal = `
        🍳 Breakfast: 4 Dosa + Eggs  
        🍛 Lunch: 2 cups rice + Chicken + Dal  
        🍲 Dinner: 4 Chapati + Paneer  
        🥜 Snacks: Peanut butter sandwich
        `;
    }

    document.getElementById("output").innerHTML = `
        <h3>Your Results</h3>
        BMI: ${bmi.toFixed(2)} <br>
        BMR: ${bmr.toFixed(2)} kcal <br>
        Daily Calories: ${calories.toFixed(2)} kcal <br>
        Protein Needed: ${protein.toFixed(2)} g <br>
        Water Intake: ${water.toFixed(2)} liters <br><br>
        <strong>Suggested Indian Meal Plan:</strong><br>
        ${meal}
    `;
}
</script>

</body>
</html>
